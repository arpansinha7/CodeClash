<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="new-room-head">Create A Room</h1>
            <form action="/lobby" method="GET">

                <div class="btn-group">
                <button type="submit" class="btn create">Generate Room</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
